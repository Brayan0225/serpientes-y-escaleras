<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serpientes y Escaleras - Literatura Medieval Española</title>
    <link rel="stylesheet" href="lib/sweetalert2.min.css">
    <link rel="stylesheet" href="css/styles.css?v=8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>

    <!-- PANTALLA DE INICIO -->
    <div id="start-screen">
        <div class="start-container">
            <div class="checkered-border top-border"></div>
            <div class="start-inner">
                <h1 class="main-title">
                    <span class="title-line1">Serpientes</span>
                    <span class="title-amp">&</span>
                    <span class="title-line2">Escaleras</span>
                </h1>
                <p class="subtitle">Literatura Medieval Española</p>

                <div class="student-badge">
                    <span class="student-icon">&#128218;</span>
                    <span class="student-name">Lidys Esther Marquez Torres</span>
                    <span class="student-grade">Grado 10</span>
                </div>

                <div class="form-group">
                    <label for="player-count">Numero de jugadores:</label>
                    <select id="player-count">
                        <option value="2">2 Jugadores</option>
                        <option value="3">3 Jugadores</option>
                        <option value="4">4 Jugadores</option>
                    </select>
                </div>

                <div id="player-inputs"></div>

                <button id="btn-start" class="btn-start">Iniciar Juego</button>

                <div class="start-extras">
                    <button id="btn-edit-questions" class="btn-extra">&#9998; Editar Preguntas</button>
                    <button id="btn-log" class="btn-extra">&#128196; Ver Participacion</button>
                </div>
                <p class="edit-hint">* Las ediciones de preguntas son temporales (solo este navegador)</p>
            </div>
            <div class="checkered-border bottom-border"></div>
        </div>
    </div>

    <!-- PANTALLA DE JUEGO -->
    <div id="game-screen">
        <div class="game-header">
            <h1 class="game-title-inline">
                &#128013; Serpientes <span class="amp-inline">&</span> Escaleras &#129695;
            </h1>
            <p class="game-subtitle-inline">Literatura Medieval Española</p>
        </div>

        <div class="game-layout">
            <div class="board-wrapper">
                <div class="board-frame">
                    <div class="board-inner">
                        <div id="board" class="board-grid"></div>
                        <svg id="board-svg" class="board-svg-overlay"></svg>
                    </div>
                </div>
                <div class="tokens-display">
                    <div id="token-indicators"></div>
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-section">
                    <h2>Turno Actual</h2>
                    <div id="turn-info"></div>
                </div>

                <div class="sidebar-section dice-section">
                    <h3>Lanzar el Dado</h3>
                    <div class="dice-scene" id="dice-scene">
                        <div class="dice-cube" id="dice-cube">
                            <div class="face face-front">
                                <span class="d center"></span>
                            </div>
                            <div class="face face-back">
                                <span class="d top-left"></span>
                                <span class="d top-right"></span>
                                <span class="d mid-left"></span>
                                <span class="d mid-right"></span>
                                <span class="d bottom-left"></span>
                                <span class="d bottom-right"></span>
                            </div>
                            <div class="face face-right">
                                <span class="d top-right"></span>
                                <span class="d center"></span>
                                <span class="d bottom-left"></span>
                            </div>
                            <div class="face face-left">
                                <span class="d top-left"></span>
                                <span class="d top-right"></span>
                                <span class="d bottom-left"></span>
                                <span class="d bottom-right"></span>
                            </div>
                            <div class="face face-top">
                                <span class="d top-left"></span>
                                <span class="d top-right"></span>
                                <span class="d center"></span>
                                <span class="d bottom-left"></span>
                                <span class="d bottom-right"></span>
                            </div>
                            <div class="face face-bottom">
                                <span class="d top-right"></span>
                                <span class="d bottom-left"></span>
                            </div>
                        </div>
                    </div>
                    <p class="dice-hint" id="dice-hint">Haz clic en el dado</p>
                </div>

                <div class="sidebar-section">
                    <h2>Jugadores</h2>
                    <div id="players-stats"></div>
                </div>

                <div class="sidebar-buttons">
                    <button id="btn-rules" class="btn-sidebar btn-rules">&#128203; Como Jugar?</button>
                    <button class="btn-sidebar btn-back" onclick="restartGame()">&#8617; Volver al Inicio</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Canvas para confetti -->
    <canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99999;display:none;"></canvas>

    <script src="lib/sweetalert2.min.js"></script>
    <script src="js/sounds.js?v=6"></script>
    <script src="js/questions.js?v=6"></script>
    <script src="js/dice.js?v=7"></script>
    <script src="js/board.js?v=6"></script>
    <script src="js/game.js?v=9"></script>
</body>
</html>
